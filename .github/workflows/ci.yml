name: Matches Service - CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**

  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Compilar y ejecutar pruebas
        run: ./mvnw clean verify

      - name: Subir artefacto JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: matches-service-jar
          path: target/*.jar