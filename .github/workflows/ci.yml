name: Matches Service - CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**

  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Compilar y empaquetar (sin tests)
        run: ./mvnw clean package -DskipTests

      - name: Análisis estático con SonarQube
        if: success()
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=am-matches-service \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Construir imagen Docker
        if: success()
        run: docker build -t am-matches-service:latest .

      - name: Subir artefacto JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: matches-service-jar
          path: target/*.jar