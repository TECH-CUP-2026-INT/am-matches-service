name: Matches Service - CI (Push)

on:
  push:
    branches:
      - main
      - develop
      - feature
      - "feature/**"
      - sebastian

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-analyze:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cachear paquetes de SonarQube
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Compilar
        run: ./mvnw --batch-mode --no-transfer-progress compile

      - name: Ejecutar pruebas
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/matches_db_test
        run: ./mvnw --batch-mode --no-transfer-progress test

      - name: Publicar reporte de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Verificar cobertura de pruebas (JaCoCo >= 80%)
        run: ./mvnw --batch-mode --no-transfer-progress jacoco:check

      - name: Publicar reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Análisis estático con SonarQube
        # El contexto "secrets" no puede usarse en una condición "if:" (no es
        # un contexto disponible ahí); por eso el chequeo de "¿está
        # configurado el token?" se hace dentro del script, no en el "if:".
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN no configurado en el repo; se omite el análisis SonarQube."
            exit 0
          fi
          ./mvnw --batch-mode --no-transfer-progress sonar:sonar \
            -Dsonar.projectKey=TECH-CUP-2026-INT_am-matches-service \
            -Dsonar.organization=tech-cup-2026-int \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Empaquetar (jar)
        if: success()
        run: ./mvnw --batch-mode --no-transfer-progress package -DskipTests

      - name: Publicar artefacto JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: matches-service-jar
          path: target/*.jar
          retention-days: 14


  dockerize-publish:
    name: Build & Publish Docker Image
    needs: build-test-analyze
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write
    outputs:
      azure_secret_present: ${{ steps.check-azure-secret.outputs.present }}
    steps:
      - name: Comprobar si el secret de Azure está configurado
        # "secrets" no es un contexto válido dentro de un "if:", así que el
        # chequeo se hace en un step normal y se expone como output del job
        # para que el job "deploy" lo lea vía "needs.*.outputs".
        id: check-azure-secret
        run: echo "present=${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}" >> "$GITHUB_OUTPUT"

      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcular metadatos de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=,format=short

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  deploy:
    name: Deploy a Azure App Service
    needs: dockerize-publish
    runs-on: ubuntu-latest
    # Se omite si el secret de publish-profile aún no está configurado, para
    # no romper el pipeline mientras se coordina el alta del App Service.
    if: github.ref == 'refs/heads/main' && needs.dockerize-publish.outputs.azure_secret_present == 'true'
    environment: production

    steps:
      - name: Desplegar contenedor en Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ghcr.io/${{ env.IMAGE_NAME }}:main