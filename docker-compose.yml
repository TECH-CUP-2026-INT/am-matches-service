services:
  mongo:
    image: mongo:7
    container_name: techcup-matches-db
    ports:
      - "27017:27017"
    volumes:
      - techcup-matches-mongodata:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"db.adminCommand('ping')\""]
      interval: 5s
      timeout: 5s
      retries: 10

  service-match:
    build: .
    container_name: techcup-matches-app
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/techcup_matches
      SERVER_PORT: 8080
      INTERNAL_API_KEY: local-dev-internal-key
      # URLs de otros servicios propios del equipo astromerge; Competencia,
      # Estadisticas y Auditoria son placeholders de otros equipos (aun no
      # existen en este workspace).
      NOTIFICACIONES_SERVICE_URL: http://service-notifications:8083
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      # Puerto de host configurable: si se levantan varios servicios de astromerge
      # a la vez (matches/notifications/logistics), cada uno usa un puerto distinto
      # para no chocar, igual que ya se hace con el puerto de Mongo.
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./observability/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus

  zipkin:
    image: openzipkin/zipkin:latest
    ports:
      - "${ZIPKIN_PORT:-9411}:9411"

volumes:
  techcup-matches-mongodata:
