spring:
  application:
    name: service-match

  autoconfigure:
    # La autenticación real la resuelve JwtClaimsFilter a partir del JWT del Gateway;
    # no usamos el UserDetailsService/usuario en memoria por defecto de Spring Security.
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/techcup_matches}
      auto-index-creation: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}

techcup:
  security:
    role-claim: roles
    referee-role: ARBITRO
    internal:
      # Debe coincidir con techcup.security.internal.api-key del servicio de
      # notificaciones (INTERNAL_API_KEY), para autenticar las llamadas
      # servicio-a-servicio vía InternalApiKeyFilter.
      api-key: ${INTERNAL_API_KEY:local-dev-internal-key}

  sanciones:
    umbral-amarillas-partido: 2

  storage:
    match-sheets-dir: ${MATCH_SHEETS_DIR:./storage/match-sheets}

  servicios:
    competencia:
      base-url: ${COMPETENCIA_SERVICE_URL:http://localhost:8081}
    estadisticas:
      base-url: ${ESTADISTICAS_SERVICE_URL:http://localhost:8082}
    notificaciones:
      base-url: ${NOTIFICACIONES_SERVICE_URL:http://localhost:8083}
    auditoria:
      base-url: ${AUDITORIA_SERVICE_URL:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}

logging:
  level:
    co.edu.escuelaing.techcup.match: INFO
