spring:
  application:
    name: service-match

  autoconfigure:
    # La autenticación real la resuelve JwtClaimsFilter a partir del JWT del Gateway;
    # no usamos el UserDetailsService/usuario en memoria por defecto de Spring Security.
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:techcup_matches}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}

techcup:
  security:
    role-claim: roles
    referee-role: ARBITRO

  sanciones:
    umbral-amarillas-partido: 2

  storage:
    match-sheets-dir: ${MATCH_SHEETS_DIR:./storage/match-sheets}

  servicios:
    competencia:
      base-url: ${COMPETENCIA_SERVICE_URL:http://localhost:8081}
    estadisticas:
      base-url: ${ESTADISTICAS_SERVICE_URL:http://localhost:8082}
    notificaciones:
      base-url: ${NOTIFICACIONES_SERVICE_URL:http://localhost:8083}
    auditoria:
      base-url: ${AUDITORIA_SERVICE_URL:http://localhost:8084}
