spring:
  application:
    name: service-match

  autoconfigure:
    # La autenticación real la resuelve JwtClaimsFilter a partir del JWT del Gateway;
    # no usamos el UserDetailsService/usuario en memoria por defecto de Spring Security.
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/techcup_matches}
      auto-index-creation: true

  # CloudAMQP compartido por todo el ecosistema TechCup (mismo broker que usan
  # Torneos y Estadísticas). RABBITMQ_PASS nunca debe quedar en este archivo:
  # solo se define como variable de entorno / secreto de despliegue.
  rabbitmq:
    host: toucan.lmq.cloudamqp.com
    port: 5671
    username: exdntvvm
    password: ${RABBITMQ_PASS:}
    virtual-host: exdntvvm
    ssl:
      enabled: true
    # Falla rápido si el broker no responde, en vez de colgar el arranque del
    # servicio (RabbitAdmin igual tolera que la declaración falle — ver
    # RabbitMQConfig — pero sin esto el intento de conexión inicial puede
    # tardar hasta el timeout por defecto del cliente de RabbitMQ).
    connection-timeout: 5000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:5625}

techcup:
  security:
    role-claim: roles
    referee-role: ARBITRO
    internal:
      # Doble uso: (1) saliente — debe coincidir con techcup.security.internal.api-key
      # del servicio de notificaciones (INTERNAL_API_KEY), para autenticar nuestras
      # llamadas hacia allá; (2) entrante — el mismo valor que Tournament debe enviar
      # en el header X-Internal-Api-Key al llamar POST /api/partidos (ver
      # InternalApiKeyFilter).
      api-key: ${INTERNAL_API_KEY:local-dev-internal-key}

  sanciones:
    umbral-amarillas-partido: 2

  storage:
    match-sheets-dir: ${MATCH_SHEETS_DIR:./storage/match-sheets}

  servicios:
    estadisticas:
      base-url: ${ESTADISTICAS_SERVICE_URL:http://localhost:8082}
    notificaciones:
      base-url: ${NOTIFICACIONES_SERVICE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}

logging:
  level:
    co.edu.escuelaing.techcup.match: INFO
